<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialNetwork Grapher</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="app-header" style="display: flex; align-items: center; justify-content: space-between;">
    <span>MOTOR DE RECOMENDACIONES DE AMIGOS</span>
    
    <div id="headerSelectionArea" style="display: flex; align-items: center; gap: 12px;">
        <div id="headerUserAvatar" style="width: 32px; height: 32px; border-radius: 50%; background-size: cover; background-position: center; border: 2px solid var(--blanco); display: none;"></div>
        
        <span id="headerUserName" style="font-size: 14px; font-weight: normal; display: none; color: var(--lila-clarito);"></span>
        
        <button id="btnMakeFriends" class="btn-Make" style="padding: 6px 14px; font-size: 13px; width: auto;" disabled>Hacer amigos</button>
    </div>
   </header>

    <div class="app-container">
        <main class="graph-panel">
            <canvas id="graphCanvas"></canvas>
        </main>

        <aside class="control-panel">
            <h2>OPCIONES Y SUGERENCIAS</h2>
            
            <button id="btnSuggest" class="btn-primary" disabled>Sugerir amigos</button>
            <button id="btnOpenModal" class="btn-secondary">Crear Usuario</button>
            <button id="btnCommunity" class="btn-terciary">Buscar Comunidades</button>
            
            <div class="suggestions-section">
                <h3>Sugerencias para la Red</h3>
                <div id="suggestionsList" class="suggestions-list">
                    <p class="empty-text">Haz clic en "Sugerir amigos" ..</p>
                </div>
            </div>
        </aside>
    </div>

    <div id="userModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Crear Nuevo Usuario</h3>
            <div class="form-group">
                <label for="newUserName">Nombre del Usuario:</label>
                <input type="text" id="newUserName" placeholder="Ej. Carlos">
            </div>
            <div class="modal-actions">
                <button id="btnCancelUser" class="btn-cancel">Cancelar</button>
                <button id="btnSaveUser" class="btn-save">Guardar</button>
            </div>
        </div>
    </div>

    <div id="communityModal" class="modal-overlay">
    <div class="modal-content" style="width: 450px;"> <h3>Comunidades Detectadas</h3>
        
        <div id="communityContainer" class="community-container" style="max-height: 300px; overflow-y: auto; margin-bottom: 20px;">
            <p class="empty-text">Procesando red...</p>
        </div>
        
        <div class="modal-actions">
            <button id="btnCloseCommunity" class="btn-cancel">Cerrar</button>
        </div>
    </div>
</div>

<div id="addFriendsModal" class="modal-overlay">
    <div class="modal-content" style="width: 420px;">
        <h3 id="addFriendsTitle">Conectar nuevos amigos</h3>
        
        <div id="nonFriendsContainer" style="max-height: 320px; overflow-y: auto; margin-bottom: 20px; padding-right: 5px;">
            <p class="empty-text">Buscando usuarios disponibles...</p>
        </div>
        
        <div class="modal-actions">
            <button id="btnCloseAddFriends" class="btn-cancel">Cerrar</button>
        </div>
    </div>
</div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
   
</body>
</html>
